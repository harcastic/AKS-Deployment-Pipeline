# redis-deployment.yml

apiVersion: apps/v1
kind: Deployment

metadata:
  namespace: cloudgallery
  name: redis
  labels:
    app: redis

spec:
  replicas: 1

  selector:
    matchLabels:
      app: redis

  template:
    metadata:
      labels:
        app: redis

    spec:
      containers:
      - name: redis
        image: redis:alpine
        imagePullPolicy: Always

        ports:
        - containerPort: 6379

        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"

          limits:
            memory: "128Mi"
            cpu: "200m"